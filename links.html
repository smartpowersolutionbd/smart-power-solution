<!DOCTYPE html>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:35px 25px;
    border-radius:15px;

    font-size:28px;
}

.tagline{
    color:#666;
    margin-top:5px;
    margin-bottom:30px;
}

.link-btn{
    display:flex;
    align-items:center;
    gap:15px;
    width:100%;
    text-decoration:none;
    padding:16px 20px;
    margin:15px 0;
    border-radius:12px;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.link-btn i{
    font-size:28px;
    width:35px;
}

.owner{
    background:#003366;
}

.website{
    background:#ff9800;
}

.facebook{
    background:#1877F2;
}

.link-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 18px rgba(0,0,0,.25);
}

footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}
